# Example config for `roi_hypoxia_rf_regressor_train.py`
# Regression counterpart of roi_hypoxia_rf_classifier_full_vis.
# All sheets in master_excel_path are concatenated; each sheet name becomes
# the STRATUM column value for that subset of ROIs.

meta:
  task_type: 'roi_hypoxia_rf_regressor_train'

paths:
  # Multi-sheet Excel: each sheet = one GG stratum, all rows are merged.
  master_excel_path: 'ROI_level\data\roi_manifest_P4_filtered_GGs_stratum_edited.xlsx'
  wavenumbers_path: 'total_data_P4\wavenumbers.npy'
  output_dir: 'ROI_level\data\outputs\P4\rf_regressor_train\all_strata'

columns:
  pimo_col: 'PIMO_HS_Tum'
  glut1_col: 'GLUT1_HS_Tum'
  roi_data_col: 'ROI_DATA'
  roi_mask_col: 'ROI_EPI_MASK'
  core_id_col: 'CORE_ID'
  patient_id_col: 'PATIENT_ID'
  path_report_col: 'PO Path report'
  stratum_col: 'STRATUM'

sampling:
  n_pixels_per_roi: 50
  random_seed: 42

rf:
  n_estimators: 500
  max_features: 'sqrt'
  min_samples_leaf: 5
  n_repeats: 20
  test_patient_ratio: 0.25

training:
  # Train a single model on ALL pixels (no hold-out) for external deployment.
  train_full_cohort: False

evaluation:
  # Out-of-fold ROI predictions (test patients only per repeat), Spearman + MAE, scatter + LOWESS.
  run_oof_eval: true
  lowess_frac: 0.3

filters:
  # Exclude problematic samples before training.
  excluded_patient_ids: [210, 224]
  excluded_core_ids: ['202H', '202J']
